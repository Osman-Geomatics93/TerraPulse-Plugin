name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # Job 1: Test terrapulse_core (pure Python, no QGIS needed)
  # ----------------------------------------------------------------
  test-core:
    name: "terrapulse_core tests (Python ${{ matrix.python-version }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-22.04, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install terrapulse_core + dev deps
        working-directory: packages/terrapulse_core
        # actions/setup-python sets the correct Python as the system default,
        # so --system installs into Python 3.11/3.12 (not the OS 3.10).
        run: uv pip install --system ".[dev]"

      - name: Run ruff linter
        run: uv run --python ${{ matrix.python-version }} ruff check packages/terrapulse_core/src

      - name: Run mypy type checker
        run: uv run --python ${{ matrix.python-version }} mypy packages/terrapulse_core/src
        continue-on-error: true  # mypy is informational; optional-dep stubs not in CI

      - name: Run pytest
        working-directory: packages/terrapulse_core
        shell: bash   # force bash so \ line-continuation works on Windows runners
        run: |
          uv run --python ${{ matrix.python-version }} pytest \
            --cov=terrapulse_core \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Upload coverage
        if: matrix.os == 'ubuntu-22.04' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: packages/terrapulse_core/coverage.xml
          flags: core
          fail_ci_if_error: false

  # ----------------------------------------------------------------
  # Job 2: Test QGIS plugin (requires qgis Docker image)
  # ----------------------------------------------------------------
  test-plugin:
    name: "QGIS plugin tests (${{ matrix.qgis-version }})"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        qgis-version: ["qgis/qgis:release-3_34"]

    container:
      image: ${{ matrix.qgis-version }}
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      # QGIS containers ship Python 3.10; terrapulse_core requires ≥3.11,
      # so we do NOT install it here — we just verify plugin file structure.
      - name: Install pytest inside QGIS Python
        run: python3 -m pip install pytest

      - name: Verify plugin file structure
        run: |
          python3 -c "
          import pathlib, sys
          plugin_dir = pathlib.Path('plugin/terrapulse')
          required = [
              '__init__.py', 'plugin.py', 'metadata.txt',
              'tasks/insar_task.py', 'dialogs/main_dialog.py',
              'map_tools/aoi_tool.py',
          ]
          missing = [f for f in required if not (plugin_dir / f).exists()]
          if missing:
              print('MISSING FILES:', missing, file=sys.stderr)
              sys.exit(1)
          print(f'Plugin structure OK — {len(list(plugin_dir.rglob(\"*.py\")))} .py files found.')
          "

  # ----------------------------------------------------------------
  # Job 3: Docker image build check
  # ----------------------------------------------------------------
  docker-build:
    name: "Docker build check"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build PyGMTSAR image (syntax check only)
        run: |
          docker build \
            -f docker/Dockerfile.pygmtsar \
            -t terrapulse-pygmtsar:ci \
            --no-cache \
            .
        timeout-minutes: 45
        continue-on-error: true  # image build is slow on CI; don't block PRs
