name: Release QGIS Plugin

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"   # matches 0.2.0, 1.0.0-rc1, etc. (no v prefix)

jobs:
  release:
    name: "Package and release plugin"
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 1. Extract version from tag (tag IS the version, e.g. 0.2.0)
      # ----------------------------------------------------------------
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------
      # 2. Version consistency checks
      # ----------------------------------------------------------------
      - name: Validate metadata.txt version matches tag
        run: |
          META_VER=$(grep "^version=" plugin/terrapulse/metadata.txt | cut -d= -f2)
          TAG_VER="${{ steps.version.outputs.VERSION }}"
          if [ "$META_VER" != "$TAG_VER" ]; then
            echo "::error::Version mismatch: metadata.txt=$META_VER, tag=$TAG_VER"
            exit 1
          fi
          echo "✓ metadata.txt version: $TAG_VER"

      - name: Validate __version__.py matches tag
        run: |
          PY_VER=$(python3 -c "
          import sys; sys.path.insert(0, 'packages/terrapulse_core/src')
          from terrapulse_core.__version__ import __version__
          print(__version__)
          ")
          TAG_VER="${{ steps.version.outputs.VERSION }}"
          if [ "$PY_VER" != "$TAG_VER" ]; then
            echo "::error::__version__.py mismatch: py=$PY_VER, tag=$TAG_VER"
            exit 1
          fi
          echo "✓ __version__.py: $PY_VER"

      # ----------------------------------------------------------------
      # 3. Build QGIS plugin zip
      #    The zip contains a top-level terrapulse/ folder so QGIS can
      #    install it directly via "Install from ZIP".
      # ----------------------------------------------------------------
      - name: Build QGIS plugin zip
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ZIP_NAME="terrapulse_${VERSION}.zip"

          (cd plugin && zip -r "../${ZIP_NAME}" terrapulse/ \
            -x "*.pyc" \
            -x "*/__pycache__/*" \
            -x "*/.DS_Store" \
            -x "*/deps/*" )

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "✓ Created: ${ZIP_NAME}"
          ls -lh "${ZIP_NAME}"

      # ----------------------------------------------------------------
      # 4. Build terrapulse_core Python wheel
      # ----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build terrapulse_core wheel
        run: |
          pip install build --quiet
          python -m build --wheel --outdir dist packages/terrapulse_core
          echo "✓ Wheel:"
          ls -lh dist/*.whl

      # ----------------------------------------------------------------
      # 5. Compute SHA-256 checksums
      # ----------------------------------------------------------------
      - name: Compute checksums
        run: |
          sha256sum "${{ env.ZIP_NAME }}" dist/*.whl | tee checksums.txt
          echo "CHECKSUMS<<EOF" >> $GITHUB_ENV
          cat checksums.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ----------------------------------------------------------------
      # 6. Publish GitHub Release
      #    Tag format: 0.2.0  (no "v" prefix — required by qgis-plugin-ci)
      #    Display name: "TerraPulse v0.2.0" (human-friendly with v)
      # ----------------------------------------------------------------
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.version.outputs.VERSION }}"
          name: "TerraPulse v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'rc') || contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') }}
          files: |
            ${{ env.ZIP_NAME }}
            dist/terrapulse_core-${{ steps.version.outputs.VERSION }}-py3-none-any.whl
          body: |
            ## TerraPulse v${{ steps.version.outputs.VERSION }}

            ### 📦 Downloads

            | File | What it is |
            |------|-----------|
            | `terrapulse_${{ steps.version.outputs.VERSION }}.zip` | **QGIS Plugin** — install via *Plugins → Manage → Install from ZIP* |
            | `terrapulse_core-${{ steps.version.outputs.VERSION }}-py3-none-any.whl` | **Python wheel** — core engine for Docker / dev environments |

            ### 🚀 Quick Install (QGIS)

            1. Download `terrapulse_${{ steps.version.outputs.VERSION }}.zip` below
            2. In QGIS → **Plugins → Manage and Install Plugins → Install from ZIP**
            3. Browse to the downloaded file → click **Install Plugin**
            4. Enable the panel: **Plugins → TerraPulse → Open TerraPulse**

            ### Requirements
            - QGIS ≥ 3.34 LTR
            - Python ≥ 3.11
            - Docker Desktop (for local InSAR processing)
            - Free [Copernicus Data Space](https://dataspace.copernicus.eu/) account

            ### SHA-256 Checksums
            ```
            ${{ env.CHECKSUMS }}
            ```

      # ----------------------------------------------------------------
      # 7. Publish to official QGIS Plugin Repository
      #    qgis-plugin-ci release VERSION looks for a GitHub release
      #    whose tag equals VERSION exactly (0.2.0) — that's why tags
      #    must NOT have a "v" prefix.
      #    Runs only when OSGEO_USERNAME + OSGEO_PASSWORD secrets are set.
      #    Skipped on pre-release tags (rc / alpha / beta).
      #
      #    Secrets: GitHub → Settings → Secrets → Actions:
      #      OSGEO_USERNAME   — your OSGeo ID (https://www.osgeo.org)
      #      OSGEO_PASSWORD   — your OSGeo password
      # ----------------------------------------------------------------
      - name: Remove stale plugin zip from release (allow re-runs)
        # Always run — safe even if the asset doesn't exist (|| true).
        # qgis-plugin-ci uploads terrapulse.<ver>.zip to the GitHub release.
        # On a re-run GitHub returns 422 "already_exists"; delete it first.
        # NOTE: no OSGEO env var here, so no env.OSGEO_USERNAME guard —
        # the guard lives on the install + publish steps that follow.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ASSET="terrapulse.${VERSION}.zip"
          echo "→ Removing ${ASSET} from release ${VERSION} (if present)…"
          gh release delete-asset "${VERSION}" "${ASSET}" \
            --yes --repo "$GITHUB_REPOSITORY" 2>/dev/null && \
            echo "   deleted" || echo "   not present (OK)"

      - name: Install qgis-plugin-ci
        if: |
          env.OSGEO_USERNAME != '' &&
          !contains(steps.version.outputs.VERSION, 'rc') &&
          !contains(steps.version.outputs.VERSION, 'alpha') &&
          !contains(steps.version.outputs.VERSION, 'beta')
        env:
          OSGEO_USERNAME: ${{ secrets.OSGEO_USERNAME }}
        run: pip install qgis-plugin-ci --quiet

      - name: Show qgis-plugin-ci upload URL (diagnostic)
        if: |
          env.OSGEO_USERNAME != '' &&
          !contains(steps.version.outputs.VERSION, 'rc') &&
          !contains(steps.version.outputs.VERSION, 'alpha') &&
          !contains(steps.version.outputs.VERSION, 'beta')
        env:
          OSGEO_USERNAME: ${{ secrets.OSGEO_USERNAME }}
        run: |
          python3 - << 'PYEOF'
          import importlib, pkgutil, inspect, sys
          try:
              import qgis_plugin_ci
              base = qgis_plugin_ci.__path__[0]
              for finder, name, ispkg in pkgutil.walk_packages([base], prefix="qgis_plugin_ci."):
                  try:
                      mod = importlib.import_module(name)
                      src = inspect.getsource(mod)
                      for line in src.splitlines():
                          l = line.strip()
                          if ("qgis.org" in l or "hub.qgis" in l) and ("http" in l or "url" in l.lower()):
                              print(f"[{name}]  {l}")
                  except Exception:
                      pass
          except Exception as e:
              print(f"diagnostic error: {e}", file=sys.stderr)
          PYEOF

      - name: Publish to QGIS Plugin Repository
        if: |
          env.OSGEO_USERNAME != '' &&
          !contains(steps.version.outputs.VERSION, 'rc') &&
          !contains(steps.version.outputs.VERSION, 'alpha') &&
          !contains(steps.version.outputs.VERSION, 'beta')
        env:
          OSGEO_USERNAME: ${{ secrets.OSGEO_USERNAME }}
          OSGEO_PASSWORD: ${{ secrets.OSGEO_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "→ Publishing TerraPulse ${VERSION} to plugins.qgis.org…"
          qgis-plugin-ci release "${VERSION}" \
            --github-token "${GITHUB_TOKEN}" \
            --osgeo-username "${OSGEO_USERNAME}" \
            --osgeo-password "${OSGEO_PASSWORD}" \
            2>&1
          echo "✓ Submitted to https://plugins.qgis.org/plugins/terrapulse/"
