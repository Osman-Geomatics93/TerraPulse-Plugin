name: Release QGIS Plugin

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: "Package and release plugin"
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 1. Extract version from tag (e.g. v0.2.0 → 0.2.0)
      # ----------------------------------------------------------------
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------
      # 2. Version consistency checks
      # ----------------------------------------------------------------
      - name: Validate metadata.txt version matches tag
        run: |
          META_VER=$(grep "^version=" plugin/terrapulse/metadata.txt | cut -d= -f2)
          TAG_VER="${{ steps.version.outputs.VERSION }}"
          if [ "$META_VER" != "$TAG_VER" ]; then
            echo "::error::Version mismatch: metadata.txt=$META_VER, tag=$TAG_VER"
            exit 1
          fi
          echo "✓ metadata.txt version: $TAG_VER"

      - name: Validate __version__.py matches tag
        run: |
          PY_VER=$(python3 -c "
          import sys; sys.path.insert(0, 'packages/terrapulse_core/src')
          from terrapulse_core.__version__ import __version__
          print(__version__)
          ")
          TAG_VER="${{ steps.version.outputs.VERSION }}"
          if [ "$PY_VER" != "$TAG_VER" ]; then
            echo "::error::__version__.py mismatch: py=$PY_VER, tag=$TAG_VER"
            exit 1
          fi
          echo "✓ __version__.py: $PY_VER"

      # ----------------------------------------------------------------
      # 3. Build QGIS plugin zip
      #    The zip contains a top-level terrapulse/ folder so QGIS can
      #    install it directly via "Install from ZIP".
      # ----------------------------------------------------------------
      - name: Build QGIS plugin zip
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ZIP_NAME="terrapulse_${VERSION}.zip"

          (cd plugin && zip -r "../${ZIP_NAME}" terrapulse/ \
            -x "*.pyc" \
            -x "*/__pycache__/*" \
            -x "*/.DS_Store" \
            -x "*/deps/*" )

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "✓ Created: ${ZIP_NAME}"
          ls -lh "${ZIP_NAME}"

      # ----------------------------------------------------------------
      # 4. Build terrapulse_core Python wheel
      # ----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build terrapulse_core wheel
        run: |
          pip install build --quiet
          python -m build --wheel --outdir dist packages/terrapulse_core
          echo "✓ Wheel:"
          ls -lh dist/*.whl

      # ----------------------------------------------------------------
      # 5. Compute SHA-256 checksums
      # ----------------------------------------------------------------
      - name: Compute checksums
        run: |
          sha256sum "${{ env.ZIP_NAME }}" dist/*.whl | tee checksums.txt
          echo "CHECKSUMS<<EOF" >> $GITHUB_ENV
          cat checksums.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ----------------------------------------------------------------
      # 6. Publish GitHub Release
      # ----------------------------------------------------------------
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.VERSION }}"
          name: "TerraPulse v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'rc') || contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') }}
          files: |
            ${{ env.ZIP_NAME }}
            dist/terrapulse_core-${{ steps.version.outputs.VERSION }}-py3-none-any.whl
          body: |
            ## TerraPulse v${{ steps.version.outputs.VERSION }}

            ### 📦 Downloads

            | File | What it is |
            |------|-----------|
            | `terrapulse_${{ steps.version.outputs.VERSION }}.zip` | **QGIS Plugin** — install via *Plugins → Manage → Install from ZIP* |
            | `terrapulse_core-${{ steps.version.outputs.VERSION }}-py3-none-any.whl` | **Python wheel** — core engine for Docker / dev environments |

            ### 🚀 Quick Install (QGIS)

            1. Download `terrapulse_${{ steps.version.outputs.VERSION }}.zip` below
            2. In QGIS → **Plugins → Manage and Install Plugins → Install from ZIP**
            3. Browse to the downloaded file → click **Install Plugin**
            4. Enable the panel: **Plugins → TerraPulse → Open TerraPulse**

            ### Requirements
            - QGIS ≥ 3.34 LTR
            - Python ≥ 3.11
            - Docker Desktop (for local InSAR processing)
            - Free [Copernicus Data Space](https://dataspace.copernicus.eu/) account

            ### SHA-256 Checksums
            ```
            ${{ env.CHECKSUMS }}
            ```

      # ----------------------------------------------------------------
      # 7. Publish to official QGIS Plugin Repository
      #    Uses Django session auth (login → CSRF → upload) — the same
      #    flow that qgis-plugin-ci uses internally.
      #    Runs only when OSGEO_USERNAME + OSGEO_PASSWORD secrets are set.
      #    Skipped on pre-release tags (rc / alpha / beta).
      #
      #    To enable: add these two secrets in
      #    GitHub → Settings → Secrets and variables → Actions:
      #      OSGEO_USERNAME   — your OSGeo ID (https://www.osgeo.org)
      #      OSGEO_PASSWORD   — your OSGeo password
      # ----------------------------------------------------------------
      - name: Publish to QGIS Plugin Repository
        if: |
          env.OSGEO_USERNAME != '' &&
          !contains(steps.version.outputs.VERSION, 'rc') &&
          !contains(steps.version.outputs.VERSION, 'alpha') &&
          !contains(steps.version.outputs.VERSION, 'beta')
        env:
          OSGEO_USERNAME: ${{ secrets.OSGEO_USERNAME }}
          OSGEO_PASSWORD: ${{ secrets.OSGEO_PASSWORD }}
        run: |
          pip install requests --quiet
          python3 << 'PYEOF'
          import os, sys, requests

          username = os.environ["OSGEO_USERNAME"]
          password = os.environ["OSGEO_PASSWORD"]
          zip_name = os.environ["ZIP_NAME"]

          BASE     = "https://plugins.qgis.org"
          LOGIN    = f"{BASE}/en/accounts/login/"
          UPLOAD   = f"{BASE}/plugins/add/"

          session = requests.Session()
          session.headers.update({"User-Agent": "TerraPulse-CI/1.0"})

          # ── 1. Fetch login page → grab CSRF token ────────────────
          print(f"→ Fetching login page…")
          r = session.get(LOGIN, timeout=30)
          csrf = session.cookies.get("csrftoken", "")
          print(f"   HTTP {r.status_code}  CSRF: {'ok' if csrf else 'missing'}")

          # ── 2. Login ─────────────────────────────────────────────
          print(f"→ Logging in as {username}…")
          r = session.post(
              LOGIN,
              data={
                  "username": username,
                  "password": password,
                  "csrfmiddlewaretoken": csrf,
              },
              headers={"Referer": LOGIN},
              allow_redirects=True,
              timeout=30,
          )
          has_session = "sessionid" in session.cookies
          print(f"   HTTP {r.status_code}  session: {'ok' if has_session else 'MISSING'}")
          if not has_session:
              # Try without /en/ prefix — some locales differ
              LOGIN_ALT = f"{BASE}/accounts/login/"
              r2 = session.get(LOGIN_ALT, timeout=30)
              csrf = session.cookies.get("csrftoken", csrf)
              r2 = session.post(
                  LOGIN_ALT,
                  data={"username": username, "password": password,
                        "csrfmiddlewaretoken": csrf},
                  headers={"Referer": LOGIN_ALT},
                  allow_redirects=True, timeout=30,
              )
              has_session = "sessionid" in session.cookies
              print(f"   Alt login HTTP {r2.status_code}  session: {'ok' if has_session else 'MISSING'}")

          if not has_session:
              print("::error::Login failed — sessionid cookie not set", file=sys.stderr)
              sys.exit(1)

          # ── 3. Upload plugin zip ─────────────────────────────────
          print(f"→ Uploading {zip_name}…")
          csrf2 = session.cookies.get("csrftoken", csrf)
          with open(zip_name, "rb") as fh:
              r = session.post(
                  UPLOAD,
                  files={"package": (zip_name, fh, "application/zip")},
                  data={"csrfmiddlewaretoken": csrf2},
                  headers={"Referer": UPLOAD},
                  allow_redirects=False,   # 302 = Django success redirect
                  timeout=180,
              )

          print(f"   Upload HTTP {r.status_code}")
          if r.status_code in (200, 201, 302):
              loc = r.headers.get("Location", "?")
              print(f"✓ Uploaded! Server → {loc}")
              print("✓ Plugin pending review at https://plugins.qgis.org/plugins/terrapulse/")
              sys.exit(0)
          else:
              # Show first 800 chars of response to help diagnose
              print(r.text[:800])
              print(f"::error::Upload failed HTTP {r.status_code}", file=sys.stderr)
              sys.exit(1)
          PYEOF
