name: Feature request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to TerraPulse.

        For broader discussions or open-ended ideas, you may prefer
        [GitHub Discussions](https://github.com/Osman-Geomatics93/TerraPulse-Plugin/discussions)
        — features are usually shaped there before becoming an issue.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Describe the user-facing problem, not the proposed solution.
        Example: "Drawing an AOI by hand for repeated runs over the same site is tedious."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: How would you like TerraPulse to behave?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have considered or ruled out.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of TerraPulse does this touch?
      multiple: true
      options:
        - STAC search / data discovery
        - SLC download (CDSE)
        - InSAR processing (PyGMTSAR)
        - ML classification
        - OSM infrastructure overlay
        - PDF / HTML reporting
        - QGIS plugin UI
        - Docker / packaging
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        Links to papers, datasets, similar tools, or QGIS plugins that
        implement something close to what you're requesting.
    validations:
      required: false

  - type: dropdown
    id: willingness
    attributes:
      label: Are you willing to help implement this?
      options:
        - "Yes, I'd like to submit a PR"
        - "Yes, I can help test"
        - "Yes, I can help review the design"
        - "No, just requesting"
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and discussions for similar requests
          required: true
        - label: I agree to follow this project's [Code of Conduct](https://github.com/Osman-Geomatics93/TerraPulse-Plugin/blob/main/CODE_OF_CONDUCT.md)
          required: true
