[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "terrapulse-core"
version = "0.2.10"
description = "Core InSAR processing, ML, and reporting engine for TerraPulse — QGIS-independent."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "GPL-3.0-or-later" }
authors = [{ name = "TerraPulse Contributors" }]
keywords = ["InSAR", "SAR", "Sentinel-1", "subsidence", "deformation", "SBAS"]

dependencies = [
    # STAC
    "pystac-client>=0.8",
    "pystac>=1.10",
    # Raster I/O
    "rasterio>=1.3",
    "odc-stac>=0.3",
    "xarray>=2024.1",
    "dask[array]>=2024.1",
    "zarr>=2.18",
    # Geospatial
    "geopandas>=1.0",
    "shapely>=2.0",
    "pyproj>=3.6",
    # ML (default lightweight path)
    "scikit-learn>=1.5",
    "numpy>=1.26",
    # OSM
    "overpy>=0.7",
    # Reporting
    "jinja2>=3.1",
    "weasyprint>=62",
    "plotly>=5.22",
    # Provenance
    "pyyaml>=6.0",
    # Config + typing
    "pydantic>=2.7",
    "typing-extensions>=4.12",
]

[project.optional-dependencies]
llm = [
    "anthropic>=0.28",
]
ml-gpu = [
    "torch>=2.3",
    "huggingface-hub>=0.23",
    "timm>=1.0",          # Prithvi uses timm ViT backbone
]
openeo = [
    "openeo>=0.31",
]
dev = [
    "pytest>=8.2",
    "pytest-cov>=5.0",
    "pytest-mock>=3.14",
    "ruff>=0.5",
    "mypy>=1.10",
    "pre-commit>=3.7",
    "types-PyYAML",
    "types-requests",
]

[tool.hatch.build.targets.wheel]
packages = ["src/terrapulse_core"]

[tool.hatch.build.targets.sdist]
include = ["src/", "tests/", "README.md", "pyproject.toml"]
