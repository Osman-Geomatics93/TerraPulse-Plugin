[tool.uv.workspace]
members = ["packages/terrapulse_core"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["packages/terrapulse_core/src", "plugin"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ANN", "TCH"]
ignore = ["ANN101", "ANN102"]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["packages/terrapulse_core/src"]
exclude = ["tests/"]

[tool.pytest.ini_options]
testpaths = ["packages/terrapulse_core/tests"]
addopts = "-v --tb=short"
