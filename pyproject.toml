[tool.uv.workspace]
members = ["packages/terrapulse_core"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["packages/terrapulse_core/src", "plugin"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ANN", "TCH"]
ignore = [
    "ANN101",  # removed rule
    "ANN102",  # removed rule
    "ANN401",  # Any is intentional in ML model wrappers and OSM type-erased returns
    "E501",    # line-length enforced by formatter, not linter
]

[tool.mypy]
python_version = "3.12"   # zarr uses PEP 695 type-param syntax; needs 3.12 parser
strict = true
files = ["packages/terrapulse_core/src"]
exclude = ["tests/"]

# Third-party packages without PEP 561 stubs — ignore rather than fail CI.
# These are either optional extras (torch, anthropic, mintpy…) or packages
# that simply don't ship type information (rasterio, affine, zarr…).
[[tool.mypy.overrides]]
module = [
    "affine.*",
    "anthropic.*",
    "dask.*",
    "geopandas.*",
    "huggingface_hub.*",
    "mintpy.*",
    "numpy.*",
    "openeo.*",
    "overpy.*",
    "plotly.*",
    "pygmtsar.*",
    "pyogrio.*",
    "pyproj.*",
    "pystac.*",
    "pystac_client.*",
    "rasterio.*",
    "scipy.*",
    "shapely.*",
    "sklearn.*",
    "timm.*",
    "torch.*",
    "weasyprint.*",
    "xarray.*",
    "zarr.*",
]
ignore_missing_imports = true
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["packages/terrapulse_core/tests"]
addopts = "-v --tb=short"
